name: Release (crates.io)

# Publish to crates.io on a GitHub Release (or manual dispatch).
#
# The sys crate's `include` list bundles only the source the build compiles
# (~3.4 MB compressed, under crates.io's 10 MB limit). `--no-verify` is required:
# ik's CMake generates common/build-info.cpp in-tree, which trips cargo's
# publish-time source-unchanged check (harmless for consumers). Requires a
# `CARGO_REGISTRY_TOKEN` repo secret.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Install build deps
        env:
          DEBIAN_FRONTEND: noninteractive
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake clang libclang-dev pkg-config git
      - name: Publish (sys first, then the safe wrapper)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p ik-llama-cpp-sys --no-verify
          sleep 45   # let crates.io index the sys crate before the dependent
          cargo publish -p ik-llama-cpp-2 --no-verify
